<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandoChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0F14;
            --surface: #14171F;
            --surface2: #1C2030;
            --surface3: #232840;
            --cyan: #00E5FF;
            --cyan-dim: rgba(0, 229, 255, 0.12);
            --cyan-glow: rgba(0, 229, 255, 0.08);
            --text: #E8EDF5;
            --text-muted: #7A8499;
            --text-dim: #4A5568;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(0, 229, 255, 0.25);
            --red: #FF4B6E;
            --green: #00C97A;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 18px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(13,15,20,0.8) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }

        /* ─── SETUP SCREEN ─── */
        #setupScreen {
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
            line-height: 1;
            text-align: center;
        }
        .logo span { color: var(--cyan); }

        .logo-sub {
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-align: center;
        }

        .online-count {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .online-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(0, 201, 122, 0.7);
            flex-shrink: 0;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse-ring 2s ease-in-out infinite;
            box-shadow: 0 0 0 0 rgba(0,229,255,0.4);
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
            60%  { box-shadow: 0 0 0 8px rgba(0,229,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,229,255,0); }
        }

        /* Username input block */
        .username-block {
            width: 380px;
        }

        .username-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .username-input-wrap {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0 14px;
            transition: border-color 0.2s;
        }
        .username-input-wrap:focus-within {
            border-color: var(--border-bright);
        }
        .username-input-wrap.error {
            border-color: rgba(255,75,110,0.5);
        }

        .username-prefix {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            color: var(--cyan);
            margin-right: 4px;
            user-select: none;
            flex-shrink: 0;
        }

        .username-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 500;
            padding: 13px 0;
        }
        .username-input::placeholder { color: var(--text-dim); font-weight: 400; }

        .username-hint {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 7px;
            min-height: 18px;
            transition: color 0.2s;
        }
        .username-hint.error { color: var(--red); }
        .username-hint.ok    { color: var(--green); }

        /* Topic grid */
        .topic-section-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            width: 380px;
            max-width: 100%;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            width: 380px;
            max-width: 100%;
        }

        /* Nemválasztó */
        .gender-section-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            width: 380px;
            max-width: 100%;
        }

        .gender-row {
            display: flex;
            gap: 12px;
            width: 380px;
            max-width: 100%;
        }

        .gender-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s, background 0.2s;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            position: relative;
        }
        .gender-btn .gender-icon { font-size: 18px; }
        .gender-btn:hover { border-color: var(--border-bright); color: var(--text); }
        .gender-btn.selected {
            border-color: var(--cyan);
            background: var(--cyan-dim);
            color: var(--text);
        }
        .gender-btn.selected::after {
            content: '✓';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--cyan);
        }
        .gender-btn-skip {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            text-decoration: underline;
            font-family: 'Inter', sans-serif;
            align-self: center;
            padding: 4px;
        }
        .gender-btn-skip:hover { color: var(--text-muted); }

        .topic-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 18px;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }
        .topic-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--cyan-glow);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .topic-btn:hover:not(:disabled) {
            border-color: var(--border-bright);
            transform: translateY(-2px);
        }
        .topic-btn:hover:not(:disabled)::before { opacity: 1; }
        .topic-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .topic-btn .topic-icon { font-size: 26px; margin-bottom: 10px; display: block; }
        .topic-btn .topic-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            display: block;
        }
        .topic-btn .topic-tag { font-size: 12px; color: var(--cyan); margin-top: 3px; display: block; }

        /* ─── CHAT SCREEN ─── */
        #chatScreen {
            padding: 0;
            align-items: stretch;
            justify-content: stretch;
        }

        .chat-shell {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(13,15,20,0.8);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 18px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
        }
        .back-btn:hover { border-color: var(--border-bright); color: var(--cyan); }

        .partner-info { display: flex; align-items: center; gap: 10px; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            position: relative;
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }
        .avatar-ring.connected {
            border-color: var(--cyan);
            animation: ring-pulse 2.5s ease-in-out infinite;
        }
        @keyframes ring-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(1.06); }
        }

        .partner-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .partner-gender-badge {
            font-size: 14px;
            line-height: 1;
        }

        .partner-status {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .status-dot.connected { background: var(--green); }
        .status-dot.waiting   { background: #FFA500; animation: blink 1s steps(1) infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .topic-pill {
            background: var(--cyan-dim);
            border: 1px solid var(--border-bright);
            color: var(--cyan);
            font-size: 12px;
            font-family: 'Space Grotesk', sans-serif;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .next-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .next-btn:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(255,75,110,0.06);
        }

        /* Chat body */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }
        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

        /* Message rows */
        .msg-row {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            animation: msgIn 0.25s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.me    { align-self: flex-end; align-items: flex-end; }
        .msg-row.other { align-self: flex-start; align-items: flex-start; }
        .msg-row.system { align-self: center; max-width: 90%; align-items: center; }

        /* Sender name above bubble (for "other" messages) */
        .msg-sender {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--cyan);
            margin-bottom: 3px;
            padding-left: 2px;
        }

        .bubble-wrap {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .msg-row.me .bubble-wrap { flex-direction: row-reverse; }

        .bubble {
            padding: 10px 14px;
            font-size: 14.5px;
            line-height: 1.5;
            border-radius: var(--radius-lg);
            word-break: break-word;
        }

        .msg-row.me .bubble {
            background: var(--cyan);
            color: #0D0F14;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg-row.other .bubble {
            background: var(--surface2);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-row.system .bubble {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            border-radius: var(--radius);
            padding: 8px 16px;
        }
        .msg-row.system.warn .bubble {
            background: rgba(255,75,110,0.08);
            border-color: rgba(255,75,110,0.25);
            color: #FF7B97;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-dim);
            flex-shrink: 0;
            margin-bottom: 2px;
            padding: 0 2px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            flex-direction: column;
            align-items: flex-start;
            align-self: flex-start;
            animation: msgIn 0.25s ease;
        }
        .typing-indicator.visible { display: flex; }

        .typing-sender {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--cyan);
            margin-bottom: 3px;
            padding-left: 2px;
        }

        .typing-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-5px); }
        }

        /* Footer */
        .chat-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: rgba(13,15,20,0.8);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: var(--border-bright); }

        .msg-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            line-height: 1.5;
            padding: 6px 0;
        }
        .msg-input::placeholder { color: var(--text-dim); }
        .msg-input:disabled { cursor: not-allowed; color: var(--text-dim); }

        .send-btn {
            background: var(--cyan);
            border: none;
            border-radius: 11px;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.15s;
            color: #0D0F14;
        }
        .send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--surface3);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-text { font-size: 14px; }

        .char-count {
            font-size: 11px;
            color: var(--text-dim);
            align-self: center;
            flex-shrink: 0;
            min-width: 28px;
            text-align: right;
            transition: color 0.2s;
        }
        .char-count.warn { color: #FFA500; }
        .char-count.over { color: var(--red); }

        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 100;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── RESZPONZÍV ─── */

        @media (max-width: 768px) {
            #setupScreen { gap: 20px; padding: 20px 16px; overflow-y: auto; justify-content: flex-start; padding-top: 32px; }
            .logo { font-size: 34px; }
            .topic-grid, .username-block, .topic-section-label, .gender-section-label, .gender-row { width: 100%; max-width: 420px; }
            .msg-row { max-width: 80%; }
            .chat-header { padding: 10px 16px; }
            .next-btn { font-size: 12px; padding: 6px 10px; }
        }

        @media (max-width: 480px) {
            #setupScreen {
                padding: 20px 16px 32px;
                justify-content: flex-start;
                overflow-y: auto;
                align-items: stretch;
                gap: 16px;
            }
            #setupScreen > div { width: 100%; align-items: stretch !important; }
            .logo { font-size: 28px; }
            .logo-sub { font-size: 12px; }
            .online-count { font-size: 12px; }

            .username-block, .topic-section-label, .gender-section-label { width: 100%; }
            .gender-row { width: 100%; }
            .gender-btn { padding: 10px 12px; font-size: 13px; }

            .topic-grid { width: 100%; grid-template-columns: 1fr 1fr; gap: 9px; }
            .topic-btn { padding: 14px 12px; }
            .topic-btn .topic-icon { font-size: 20px; margin-bottom: 6px; }
            .topic-btn .topic-name { font-size: 13px; }
            .topic-btn .topic-tag { font-size: 11px; }

            .chat-header { padding: 10px 12px; flex-wrap: nowrap; gap: 6px; }
            .header-left { gap: 8px; min-width: 0; flex: 1; }
            .back-btn { width: 30px; height: 30px; font-size: 15px; flex-shrink: 0; }
            .partner-info { gap: 7px; min-width: 0; }
            .avatar { width: 30px; height: 30px; font-size: 14px; }
            .partner-name { font-size: 13px; max-width: 130px; }
            .partner-status { font-size: 11px; }
            .topic-pill { display: none; }
            .next-btn { font-size: 12px; padding: 6px 10px; gap: 4px; white-space: nowrap; flex-shrink: 0; }

            .chat-body { padding: 14px 12px; }
            .msg-row { max-width: 88%; }
            .bubble { font-size: 14px; padding: 9px 12px; }
            .chat-footer { padding: 10px 12px; }
            .msg-input { font-size: 14px; }
            .send-btn { width: 36px; height: 36px; }
            #toast { bottom: 90px; font-size: 12px; padding: 8px 14px; }
        }

        @media (max-width: 360px) {
            .logo { font-size: 24px; }
            .topic-btn .topic-name { font-size: 12px; }
            .partner-name { max-width: 90px; }
            .next-btn span { display: none; }
        }

        @media (max-height: 600px) and (max-width: 768px) {
            #setupScreen { padding-top: 12px; gap: 12px; }
            .logo { font-size: 24px; }
            .logo-sub, .online-count { display: none; }
            .topic-btn { padding: 10px 12px; }
            .topic-btn .topic-icon { font-size: 18px; margin-bottom: 4px; }
        }

        @media (min-width: 1200px) {
            #chatScreen { align-items: center; justify-content: center; }
            .chat-shell {
                width: 820px; height: 90vh; max-height: 860px;
                border: 1px solid var(--border); border-radius: var(--radius-lg);
                overflow: hidden; box-shadow: 0 0 60px rgba(0,229,255,0.04);
            }
        }

        @media (min-width: 900px) and (max-width: 1199px) {
            #chatScreen { align-items: center; justify-content: center; }
            .chat-shell {
                width: 700px; height: 88vh;
                border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
            }
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div class="screen" id="setupScreen">
        <div style="display:flex; flex-direction:column; align-items:center; gap:28px;">

            <div class="logo-area">
                <div class="logo">Rando<span>Chat</span></div>
                <div class="logo-sub">
                    <span class="pulse-dot"></span>Ismeretlen emberek, valódi beszélgetések
                </div>
                <div id="onlineCount" class="online-count">
                    <span class="online-dot"></span><span id="onlineNum">–</span> ember van most online
                </div>
            </div>

            <!-- Username input -->
            <div class="username-block">
                <label class="username-label" for="usernameInp">Felhasználóneved</label>
                <div class="username-input-wrap" id="usernameWrap">
                    <span class="username-prefix">@</span>
                    <input
                        type="text"
                        id="usernameInp"
                        class="username-input"
                        placeholder="pl. CoolGamer99"
                        maxlength="20"
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>
                <div class="username-hint" id="usernameHint">3–20 karakter, csak betű, szám és kötőjel</div>
            </div>

            <!-- Nemválasztó -->
            <div class="gender-section-label">Ki vagy te?</div>
            <div style="display:flex; flex-direction:column; align-items:center; gap:8px; width:380px; max-width:100%;">
                <div class="gender-row">
                    <button class="gender-btn" id="genderFerfi" onclick="nemValaszt('ferfi')">
                        <span class="gender-icon">♂️</span> Férfi
                    </button>
                    <button class="gender-btn" id="genderNo" onclick="nemValaszt('no')">
                        <span class="gender-icon">♀️</span> Nő
                    </button>
                </div>
                <button class="gender-btn-skip" onclick="nemValaszt(null)">Inkább nem adom meg</button>
            </div>

            <!-- Topic grid -->
            <div class="topic-section-label">Válassz témát a csatlakozáshoz</div>
            <div class="topic-grid">
                <button class="topic-btn" id="btn-gaming" onclick="csatlakozas('gaming')" disabled>
                    <span class="topic-icon">🎮</span>
                    <span class="topic-name">Gaming</span>
                    <span class="topic-tag">#gaming</span>
                </button>
                <button class="topic-btn" id="btn-filmek" onclick="csatlakozas('filmek')" disabled>
                    <span class="topic-icon">🎬</span>
                    <span class="topic-name">Filmek</span>
                    <span class="topic-tag">#filmek</span>
                </button>
                <button class="topic-btn" id="btn-zene" onclick="csatlakozas('zene')" disabled>
                    <span class="topic-icon">🎵</span>
                    <span class="topic-name">Zene</span>
                    <span class="topic-tag">#zene</span>
                </button>
                <button class="topic-btn" id="btn-random" onclick="csatlakozas('random')" disabled>
                    <span class="topic-icon">🎲</span>
                    <span class="topic-name">Random</span>
                    <span class="topic-tag">#random</span>
                </button>
                <button class="topic-btn" id="btn-sorozat" onclick="csatlakozas('sorozat')" disabled>
                    <span class="topic-icon">📺</span>
                    <span class="topic-name">Sorozat / Anime</span>
                    <span class="topic-tag">#sorozat</span>
                </button>
                <button class="topic-btn" id="btn-iskola" onclick="csatlakozas('iskola')" disabled>
                    <span class="topic-icon">🎓</span>
                    <span class="topic-name">Iskola / Uni</span>
                    <span class="topic-tag">#iskola</span>
                </button>
                <button class="topic-btn" id="btn-lelki" onclick="csatlakozas('lelki')" disabled>
                    <span class="topic-icon">💙</span>
                    <span class="topic-name">Lelki segély</span>
                    <span class="topic-tag">#lelki-segely</span>
                </button>
                <button class="topic-btn" id="btn-tech" onclick="csatlakozas('tech')" disabled>
                    <span class="topic-icon">💻</span>
                    <span class="topic-name">Tech / Kód</span>
                    <span class="topic-tag">#tech</span>
                </button>
            </div>

        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div class="screen hidden" id="chatScreen">
        <div class="chat-shell">

            <div class="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="visszaFoMenube()" title="Vissza">←</button>
                    <div class="partner-info">
                        <div class="avatar" id="partnerAvatar">
                            <div class="avatar-ring" id="avatarRing"></div>
                            <span id="avatarEmoji">👤</span>
                        </div>
                        <div>
                            <div class="partner-name" id="partnerName">
                                <span id="partnerNameText">Várakozás...</span>
                                <span class="partner-gender-badge" id="partnerGenderBadge"></span>
                            </div>
                            <div class="partner-status">
                                <div class="status-dot waiting" id="statusDot"></div>
                                <span id="statusText">Partnert keresünk</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="topic-pill" id="topicPill">#téma</span>
                    <button class="next-btn" onclick="kovetkezo()">⏭ Következő</button>
                </div>
            </div>

            <div class="chat-body" id="chatBody">
                <div class="chat-empty" id="chatEmpty">
                    <div class="spinner"></div>
                    <div class="empty-text">Várakozás egy partnerre...</div>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-sender" id="typingSender"></div>
                    <div class="typing-bubble">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>

            <div class="chat-footer">
                <div class="input-row">
                    <input
                        type="text"
                        class="msg-input"
                        id="uzenetInp"
                        placeholder="Írj valamit..."
                        disabled
                        maxlength="500"
                        autocomplete="off"
                    >
                    <span class="char-count" id="charCount">500</span>
                    <button class="send-btn" id="sendBtn" onclick="kuldes()" disabled title="Küldés">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let aktualisTema = "";
        let sajatNev = "";
        let partnerNev = "";
        let sajatNem = null;       // 'ferfi' | 'no' | null
        let isConnected = false;
        let typingTimeout = null;
        let partnerTypingTimeout = null;

        const TOPIC_META = {
            gaming:  { icon: '🎮' },
            filmek:  { icon: '🎬' },
            zene:    { icon: '🎵' },
            random:  { icon: '🎲' },
            sorozat: { icon: '📺' },
            iskola:  { icon: '🎓' },
            lelki:   { icon: '💙' },
            tech:    { icon: '💻' },
        };

        const GENDER_ICON = { ferfi: '♂️', no: '♀️' };

        // ─── FELHASZNÁLÓNÉV VALIDÁCIÓ ──────────────────
        const usernameInp = document.getElementById('usernameInp');
        const usernameWrap = document.getElementById('usernameWrap');
        const usernameHint = document.getElementById('usernameHint');
        const topicBtns = document.querySelectorAll('.topic-btn');

        const USERNAME_RE = /^[a-zA-Z0-9áéíóöőúüűÁÉÍÓÖŐÚÜŰ_\-]{3,20}$/;

        function validateUsername(val) {
            if (val.length === 0) return null;          // üres — semleges
            if (val.length < 3) return 'short';
            if (!USERNAME_RE.test(val)) return 'invalid';
            return 'ok';
        }

        usernameInp.addEventListener('input', () => {
            const val = usernameInp.value.trim();
            const state = validateUsername(val);

            usernameWrap.classList.remove('error');
            usernameHint.className = 'username-hint';

            if (state === null) {
                usernameHint.textContent = '3–20 karakter, csak betű, szám és kötőjel';
                topicBtns.forEach(b => b.disabled = true);
            } else if (state === 'short') {
                usernameHint.textContent = 'Legalább 3 karakter kell';
                usernameHint.className = 'username-hint error';
                usernameWrap.classList.add('error');
                topicBtns.forEach(b => b.disabled = true);
            } else if (state === 'invalid') {
                usernameHint.textContent = 'Csak betű, szám, kötőjel és aláhúzás megengedett';
                usernameHint.className = 'username-hint error';
                usernameWrap.classList.add('error');
                topicBtns.forEach(b => b.disabled = true);
            } else {
                usernameHint.textContent = '✓ Szép választás!';
                usernameHint.className = 'username-hint ok';
                topicBtns.forEach(b => b.disabled = false);
            }
        });

        // ─── LINK FELISMERÉS (kliens oldali védelem) ──
        const LINK_RE = /((https?:\/\/|www\.)[^\s]+|[a-zA-Z0-9\-]+\.(com|net|org|hu|io|co|xyz|gg|me|tv|ru|de|uk|fr|eu|app|dev|ai)(\.[a-zA-Z]{2,})?(?:\/[^\s]*)?)/gi;

        function containsLink(text) {
            return LINK_RE.test(text);
        }

        // ─── HANGJELZÉSEK ─────────────────────────────
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new AudioContext();
            return audioCtx;
        }

        function playBeep(freq = 880, duration = 0.12, vol = 0.18) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch (e) { /* hanglejátszás nem elérhető */ }
        }

        // Üzenet érkezési hang: két rövid pittyenő
        function playMessageSound() {
            playBeep(880, 0.08, 0.15);
            setTimeout(() => playBeep(1100, 0.08, 0.12), 90);
        }

        // Partner csatlakozási hang: felfelé ívelő kettős pittyenő
        function playConnectSound() {
            playBeep(660, 0.1, 0.2);
            setTimeout(() => playBeep(990, 0.15, 0.2), 120);
        }

        // ─── ONLINE SZÁMLÁLÓ ──────────────────────────
        socket.on('online_count', (szam) => {
            document.getElementById('onlineNum').textContent = szam;
        });

        // ─── NAVIGÁCIÓ ────────────────────────────────
        function mutatChatKepernyo() {
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        }

        function mutatSetupKepernyo() {
            document.getElementById('chatScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
        }

        function visszaFoMenube() {
            // Kifejezetten szólunk a szervernek, hogy végleg kilépünk a chatből/várólistáról
            socket.emit('leave_chat'); 
            
            setWaitingState();
            clearMessages();
            mutatSetupKepernyo();
        }

        // ─── STATE ────────────────────────────────────
        function setWaitingState() {
            isConnected = false;
            partnerNev = "";
            document.getElementById('statusDot').className = 'status-dot waiting';
            document.getElementById('statusText').textContent = 'Partnert keresünk';
            document.getElementById('partnerNameText').textContent = 'Várakozás...';
            document.getElementById('partnerGenderBadge').textContent = '';
            document.getElementById('avatarRing').className = 'avatar-ring';
            document.getElementById('avatarEmoji').textContent = '👤';
            document.getElementById('uzenetInp').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('chatEmpty').style.display = 'flex';
        }

        function setConnectedState(topic, nev, partnerGender) {
            isConnected = true;
            partnerNev = nev || 'Partner';
            const meta = TOPIC_META[topic] || { icon: '💬' };
            document.getElementById('statusDot').className = 'status-dot connected';
            document.getElementById('statusText').textContent = 'Csatlakozva';
            document.getElementById('partnerNameText').textContent = partnerNev;
            document.getElementById('partnerGenderBadge').textContent = partnerGender ? (GENDER_ICON[partnerGender] || '') : '';
            document.getElementById('avatarRing').className = 'avatar-ring connected';
            document.getElementById('avatarEmoji').textContent = meta.icon;
            document.getElementById('uzenetInp').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatEmpty').style.display = 'none';
            document.getElementById('typingSender').textContent = partnerNev + ' ír...';
            document.getElementById('uzenetInp').focus();
        }

        function setDisconnectedState() {
            isConnected = false;
            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').textContent = 'Kapcsolat megszakadt';
            document.getElementById('avatarRing').className = 'avatar-ring';
            document.getElementById('partnerGenderBadge').textContent = '';
            document.getElementById('uzenetInp').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        function clearMessages() {
            const body = document.getElementById('chatBody');
            Array.from(body.querySelectorAll('.msg-row')).forEach(el => el.remove());
            document.getElementById('chatEmpty').style.display = 'flex';
        }

        // ─── NEMVÁLASZTÓ ──────────────────────────────
        function nemValaszt(nem) {
            sajatNem = nem;
            document.getElementById('genderFerfi').classList.toggle('selected', nem === 'ferfi');
            document.getElementById('genderNo').classList.toggle('selected', nem === 'no');
        }

        // ─── AKCIÓK ───────────────────────────────────
        function csatlakozas(tema) {
            sajatNev = usernameInp.value.trim();
            if (!sajatNev || validateUsername(sajatNev) !== 'ok') return;

            aktualisTema = tema;
            document.getElementById('topicPill').textContent = '#' + tema;
            mutatChatKepernyo();
            setWaitingState();
            socket.emit('join_topic', { topic: tema, username: sajatNev, gender: sajatNem });
        }

        let lastSendTime = 0;

        function kuldes() {
            const inp = document.getElementById('uzenetInp');
            const msg = inp.value.trim();
            if (!msg || !isConnected) return;

            // Kliens oldali cooldown (azonnali visszajelzés)
            const now = Date.now();
            if (now - lastSendTime < 1000) {
                showToast('Várj egy kicsit küldés előtt!');
                return;
            }
            lastSendTime = now;

            // Kliens oldali link blokkolás
            LINK_RE.lastIndex = 0;
            if (containsLink(msg)) {
                addMessage('Az üzenet nem küldhető el: linkek küldése nem engedélyezett.', 'warn');
                inp.value = '';
                updateCharCount();
                return;
            }

            socket.emit('send_message', msg);
            addMessage(msg, 'me');
            inp.value = '';
            updateCharCount();
            socket.emit('typing_stop');
        }

        function kovetkezo() {
            clearMessages();
            setWaitingState();
            addSystemMsg('Új partnert keresünk...');
            socket.emit('next_partner');
        }

        // ─── ÜZENETEK ─────────────────────────────────
        function addMessage(text, type, senderName) {
            const body = document.getElementById('chatBody');
            const typingEl = document.getElementById('typingIndicator');
            const isSystem = type === 'system' || type === 'warn';

            const row = document.createElement('div');
            row.className = 'msg-row ' + type;

            const now = new Date().toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });

            if (isSystem) {
                row.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            } else if (type === 'other') {
                row.innerHTML = `
                    <div class="msg-sender">${escapeHtml(senderName || partnerNev)}</div>
                    <div class="bubble-wrap">
                        <div class="bubble">${escapeHtml(text)}</div>
                        <div class="msg-time">${now}</div>
                    </div>
                `;
            } else {
                // 'me'
                row.innerHTML = `
                    <div class="bubble-wrap">
                        <div class="msg-time">${now}</div>
                        <div class="bubble">${escapeHtml(text)}</div>
                    </div>
                `;
            }

            body.insertBefore(row, typingEl);
            body.scrollTop = body.scrollHeight;
        }

        function addSystemMsg(text) { addMessage(text, 'system'); }

        function removeLastSystemMsg() {
            const body = document.getElementById('chatBody');
            const rows = body.querySelectorAll('.msg-row.system');
            if (rows.length > 0) rows[rows.length - 1].remove();
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        // ─── KARAKTERSZÁMLÁLÓ ─────────────────────────
        const msgInp = document.getElementById('uzenetInp');
        const charCountEl = document.getElementById('charCount');

        function updateCharCount() {
            const remaining = 500 - msgInp.value.length;
            charCountEl.textContent = remaining;
            charCountEl.className = 'char-count' + (remaining < 0 ? ' over' : remaining < 50 ? ' warn' : '');
        }

        msgInp.addEventListener('input', () => {
            updateCharCount();
            if (!isConnected) return;
            socket.emit('typing_start');
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('typing_stop'), 2000);
        });

        msgInp.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                kuldes();
            }
        });

        // ─── SOCKET EVENTS ────────────────────────────
        socket.on('waiting', () => setWaitingState());

        socket.on('chat_ready', ({ message, partnerUsername, partnerGender }) => {
            removeLastSystemMsg();
            setConnectedState(aktualisTema, partnerUsername, partnerGender);
            addSystemMsg(message);
            playConnectSound();
        });

        socket.on('receive_message', ({ text, senderName }) => {
            hideTyping();
            if (text.startsWith('RENDSZER:')) {
                addMessage(text.replace('RENDSZER:', '').trim(), 'warn');
            } else {
                addMessage(text, 'other', senderName);
                // Hang + tab értesítés ha a felhasználó nem látja az oldalt
                playMessageSound();
                if (document.hidden) {
                    document.title = '💬 Új üzenet! — RandoChat';
                }
            }
        });

        // Ha visszatér a fülre, visszaállítjuk a title-t
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                document.title = 'RandoChat';
            }
        });

        socket.on('partner_left', ({ reason, partnerName }) => {
            setDisconnectedState();
            hideTyping();
            if (reason === 'next') {
                addSystemMsg(`${partnerName || 'A partner'} új partnert keres.`);
            } else {
                addSystemMsg(`${partnerName || 'A partner'} elhagyta a chatet.`);
            }
        });

        socket.on('partner_typing', () => {
            showTyping();
            clearTimeout(partnerTypingTimeout);
            partnerTypingTimeout = setTimeout(hideTyping, 3000);
        });

        socket.on('partner_typing_stop', hideTyping);

        function showTyping() {
            const el = document.getElementById('typingIndicator');
            el.classList.add('visible');
            document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('visible');
        }

        // ─── TOAST ────────────────────────────────────
        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        updateCharCount();
    </script>
</body>
</html>
