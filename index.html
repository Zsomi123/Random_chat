<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandoChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0F14;
            --surface: #14171F;
            --surface2: #1C2030;
            --surface3: #232840;
            --cyan: #00E5FF;
            --cyan-dim: rgba(0, 229, 255, 0.12);
            --cyan-glow: rgba(0, 229, 255, 0.08);
            --purple: #7B5CE4;
            --purple-dim: rgba(123, 92, 228, 0.15);
            --text: #E8EDF5;
            --text-muted: #7A8499;
            --text-dim: #4A5568;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(0, 229, 255, 0.25);
            --red: #FF4B6E;
            --green: #00C97A;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 18px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(13,15,20,0.8) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── SCREENS ─── */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }

        /* ─── SETUP SCREEN ─── */
        #setupScreen {
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        .logo-area {
            text-align: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
            line-height: 1;
        }

        .logo span {
            color: var(--cyan);
        }

        .logo-sub {
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* Animated cyan dot */
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse-ring 2s ease-in-out infinite;
            box-shadow: 0 0 0 0 rgba(0,229,255,0.4);
        }

        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
            60%  { box-shadow: 0 0 0 8px rgba(0,229,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,229,255,0); }
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            width: 380px;
        }

        .topic-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 18px;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }

        .topic-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--cyan-glow);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .topic-btn:hover {
            border-color: var(--border-bright);
            transform: translateY(-2px);
        }

        .topic-btn:hover::before { opacity: 1; }

        .topic-btn .topic-icon {
            font-size: 26px;
            margin-bottom: 10px;
            display: block;
        }

        .topic-btn .topic-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            display: block;
        }

        .topic-btn .topic-tag {
            font-size: 12px;
            color: var(--cyan);
            margin-top: 3px;
            display: block;
        }

        .online-count {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ─── CHAT SCREEN ─── */
        #chatScreen {
            padding: 0;
            align-items: stretch;
            justify-content: stretch;
        }

        .chat-shell {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(13,15,20,0.8);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 18px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
        }

        .back-btn:hover {
            border-color: var(--border-bright);
            color: var(--cyan);
        }

        .partner-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            position: relative;
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .avatar-ring.connected {
            border-color: var(--cyan);
            animation: ring-pulse 2.5s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(1.06); }
        }

        .partner-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .partner-status {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: background 0.3s;
            flex-shrink: 0;
        }

        .status-dot.connected { background: var(--green); }
        .status-dot.waiting   { background: #FFA500; animation: blink 1s steps(1) infinite; }

        @keyframes blink { 50% { opacity: 0; } }

        .topic-pill {
            background: var(--cyan-dim);
            border: 1px solid var(--border-bright);
            color: var(--cyan);
            font-size: 12px;
            font-family: 'Space Grotesk', sans-serif;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .next-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .next-btn:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(255,75,110,0.06);
        }

        /* Chat body */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

        /* Message bubbles */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 70%;
            animation: msgIn 0.25s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.me    { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.other { align-self: flex-start; }
        .msg-row.system { align-self: center; max-width: 90%; }

        .bubble {
            padding: 10px 14px;
            font-size: 14.5px;
            line-height: 1.5;
            border-radius: var(--radius-lg);
            word-break: break-word;
        }

        .msg-row.me .bubble {
            background: var(--cyan);
            color: #0D0F14;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg-row.other .bubble {
            background: var(--surface2);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-row.system .bubble {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            border-radius: var(--radius);
            padding: 8px 16px;
        }

        .msg-row.system.warn .bubble {
            background: rgba(255,75,110,0.08);
            border-color: rgba(255,75,110,0.25);
            color: #FF7B97;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-dim);
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .msg-row.me .msg-time { text-align: right; }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: flex-end;
            gap: 8px;
            align-self: flex-start;
            animation: msgIn 0.25s ease;
        }

        .typing-indicator.visible { display: flex; }

        .typing-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-5px); }
        }

        /* Chat footer / input area */
        .chat-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: rgba(13,15,20,0.8);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: var(--border-bright);
        }

        .msg-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            line-height: 1.5;
            padding: 6px 0;
        }

        .msg-input::placeholder { color: var(--text-dim); }

        .msg-input:disabled {
            cursor: not-allowed;
            color: var(--text-dim);
        }

        .send-btn {
            background: var(--cyan);
            border: none;
            border-radius: 11px;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.15s;
            color: #0D0F14;
        }

        .send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Empty / waiting state */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--surface3);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-text {
            font-size: 14px;
        }

        /* Character counter */
        .char-count {
            font-size: 11px;
            color: var(--text-dim);
            align-self: center;
            flex-shrink: 0;
            min-width: 28px;
            text-align: right;
            transition: color 0.2s;
        }

        .char-count.warn { color: #FFA500; }
        .char-count.over { color: var(--red); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 100;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .topic-grid { width: 320px; grid-template-columns: 1fr 1fr; }
            .msg-row { max-width: 85%; }
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div class="screen" id="setupScreen">
        <div id="setupContent">
            <div class="logo-area" style="text-align:center; margin-bottom: 40px;">
                <div class="logo">Rando<span>Chat</span></div>
                <div class="logo-sub">
                    <span class="pulse-dot"></span>Ismeretlen emberek, valódi beszélgetések
                </div>
            </div>

            <div class="topic-grid">
                <button class="topic-btn" onclick="csatlakozas('gaming')">
                    <span class="topic-icon">🎮</span>
                    <span class="topic-name">Gaming</span>
                    <span class="topic-tag">#gaming</span>
                </button>
                <button class="topic-btn" onclick="csatlakozas('filmek')">
                    <span class="topic-icon">🎬</span>
                    <span class="topic-name">Filmek</span>
                    <span class="topic-tag">#filmek</span>
                </button>
                <button class="topic-btn" onclick="csatlakozas('zene')">
                    <span class="topic-icon">🎵</span>
                    <span class="topic-name">Zene</span>
                    <span class="topic-tag">#zene</span>
                </button>
                <button class="topic-btn" onclick="csatlakozas('random')">
                    <span class="topic-icon">🎲</span>
                    <span class="topic-name">Random</span>
                    <span class="topic-tag">#random</span>
                </button>
            </div>

            <div class="online-count" id="onlineCount" style="margin-top:24px;">
                Csatlakozásra vár...
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div class="screen hidden" id="chatScreen">
        <div class="chat-shell">

            <!-- Header -->
            <div class="chat-header">
                <div class="header-left">
                    <button class="back-btn" onclick="visszaFoMenube()" title="Vissza">
                        ←
                    </button>
                    <div class="partner-info">
                        <div class="avatar" id="partnerAvatar">
                            <div class="avatar-ring" id="avatarRing"></div>
                            <span id="avatarEmoji">👤</span>
                        </div>
                        <div>
                            <div class="partner-name" id="partnerName">Várakozás...</div>
                            <div class="partner-status">
                                <div class="status-dot waiting" id="statusDot"></div>
                                <span id="statusText">Partnert keresünk</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="topic-pill" id="topicPill">#téma</span>
                    <button class="next-btn" onclick="kovetkezo()" id="nextBtn">
                        ⏭ Következő
                    </button>
                </div>
            </div>

            <!-- Chat body -->
            <div class="chat-body" id="chatBody">
                <div class="chat-empty" id="chatEmpty">
                    <div class="spinner"></div>
                    <div class="empty-text">Várakozás egy partnerre...</div>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-bubble">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="chat-footer">
                <div class="input-row">
                    <input
                        type="text"
                        class="msg-input"
                        id="uzenetInp"
                        placeholder="Írj valamit..."
                        disabled
                        maxlength="500"
                        autocomplete="off"
                    >
                    <span class="char-count" id="charCount">500</span>
                    <button class="send-btn" id="sendBtn" onclick="kuldes()" disabled title="Küldés">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let aktualisTema = "";
        let isConnected = false;
        let typingTimeout = null;
        let partnerTypingTimeout = null;

        const TOPIC_META = {
            gaming:  { icon: '🎮', label: 'Gamer' },
            filmek:  { icon: '🎬', label: 'Filmrajongó' },
            zene:    { icon: '🎵', label: 'Zenész' },
            random:  { icon: '🎲', label: 'Random' },
        };

        // ─── NAVIGATION ───────────────────────────────
        function mutatChatKepernyo() {
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        }

        function mutatSetupKepernyo() {
            document.getElementById('chatScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
        }

        function visszaFoMenube() {
            if (isConnected) {
                socket.emit('next_partner'); // Disconnect cleanly
            }
            setDisconnectedState();
            clearMessages();
            mutatSetupKepernyo();
        }

        // ─── STATE HELPERS ────────────────────────────
        function setWaitingState() {
            isConnected = false;
            document.getElementById('statusDot').className = 'status-dot waiting';
            document.getElementById('statusText').textContent = 'Partnert keresünk';
            document.getElementById('partnerName').textContent = 'Várakozás...';
            document.getElementById('avatarRing').className = 'avatar-ring';
            document.getElementById('avatarEmoji').textContent = '👤';
            document.getElementById('uzenetInp').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('chatEmpty').style.display = 'flex';
        }

        function setConnectedState(topic) {
            isConnected = true;
            const meta = TOPIC_META[topic] || { icon: '💬', label: 'Partner' };
            document.getElementById('statusDot').className = 'status-dot connected';
            document.getElementById('statusText').textContent = 'Csatlakozva';
            document.getElementById('partnerName').textContent = meta.label;
            document.getElementById('avatarRing').className = 'avatar-ring connected';
            document.getElementById('avatarEmoji').textContent = meta.icon;
            document.getElementById('uzenetInp').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatEmpty').style.display = 'none';
            document.getElementById('uzenetInp').focus();
        }

        function setDisconnectedState() {
            isConnected = false;
            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').textContent = 'Kapcsolat megszakadt';
            document.getElementById('partnerName').textContent = 'Partner';
            document.getElementById('avatarRing').className = 'avatar-ring';
            document.getElementById('uzenetInp').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        function clearMessages() {
            const body = document.getElementById('chatBody');
            // Remove all message rows, keep empty placeholder and typing indicator
            Array.from(body.querySelectorAll('.msg-row')).forEach(el => el.remove());
            document.getElementById('chatEmpty').style.display = 'flex';
        }

        // ─── ACTIONS ──────────────────────────────────
        function csatlakozas(tema) {
            aktualisTema = tema;
            document.getElementById('topicPill').textContent = '#' + tema;
            mutatChatKepernyo();
            setWaitingState();
            socket.emit('join_topic', tema);
        }

        function kuldes() {
            const inp = document.getElementById('uzenetInp');
            const msg = inp.value.trim();
            if (!msg || !isConnected) return;
            socket.emit('send_message', msg);
            addMessage(msg, 'me');
            inp.value = '';
            updateCharCount();
            socket.emit('typing_stop');
        }

        function kovetkezo() {
            clearMessages();
            setWaitingState();
            addSystemMsg('Rendszer: Új partnert keresünk...');
            socket.emit('next_partner');
        }

        // ─── MESSAGES ─────────────────────────────────
        function addMessage(text, type) {
            // type: 'me' | 'other' | 'system' | 'warn'
            const body = document.getElementById('chatBody');
            const typingEl = document.getElementById('typingIndicator');

            const isSystem = type === 'system' || type === 'warn';
            const row = document.createElement('div');
            row.className = 'msg-row ' + type;

            const now = new Date().toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });

            if (isSystem) {
                row.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            } else {
                const timeEl = `<div class="msg-time">${now}</div>`;
                row.innerHTML = `
                    ${type === 'me' ? timeEl : ''}
                    <div class="bubble">${escapeHtml(text)}</div>
                    ${type === 'other' ? timeEl : ''}
                `;
            }

            body.insertBefore(row, typingEl);
            body.scrollTop = body.scrollHeight;
        }

        function addSystemMsg(text) {
            addMessage(text, 'system');
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        // ─── CHAR COUNTER ─────────────────────────────
        const inp = document.getElementById('uzenetInp');
        const charCountEl = document.getElementById('charCount');

        function updateCharCount() {
            const remaining = 500 - inp.value.length;
            charCountEl.textContent = remaining;
            charCountEl.className = 'char-count' + (remaining < 0 ? ' over' : remaining < 50 ? ' warn' : '');
        }

        inp.addEventListener('input', () => {
            updateCharCount();
            if (!isConnected) return;
            socket.emit('typing_start');
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('typing_stop'), 2000);
        });

        inp.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                kuldes();
            }
        });

        // ─── SOCKET EVENTS ────────────────────────────
        socket.on('waiting', () => {
            setWaitingState();
        });

        socket.on('chat_ready', (msg) => {
            setConnectedState(aktualisTema);
            addSystemMsg(msg);
        });

        socket.on('receive_message', (msg) => {
            hideTyping();
            if (msg.startsWith('RENDSZER:')) {
                addMessage(msg.replace('RENDSZER:', '').trim(), 'warn');
            } else {
                addMessage(msg, 'other');
            }
        });

        socket.on('partner_left', (msg) => {
            setDisconnectedState();
            addSystemMsg(msg);
            hideTyping();
        });

        socket.on('partner_typing', () => {
            showTyping();
            clearTimeout(partnerTypingTimeout);
            partnerTypingTimeout = setTimeout(hideTyping, 3000);
        });

        socket.on('partner_typing_stop', hideTyping);

        function showTyping() {
            const el = document.getElementById('typingIndicator');
            el.classList.add('visible');
            document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('visible');
        }

        // ─── TOAST ────────────────────────────────────
        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // Init char counter
        updateCharCount();
    </script>
</body>
</html>
