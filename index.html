<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Témás Random Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; }
        #chatBox { height: 300px; border: 1px solid #aaa; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Témás Random Chat</h2>
    
    <div id="setup">
        <p>Válassz témát:</p>
        <button onclick="csatlakozas('gaming')">#gaming</button>
        <button onclick="csatlakozas('filmek')">#filmek</button>
    </div>

    <div id="chatFelület" style="display:none;">
        <h3 id="temaCim"></h3>
        <div id="chatBox"></div>
        <input type="text" id="uzenetInp" placeholder="Írj valamit...">
        <button onclick="kuldes()">Küldés</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chatBox');

        function csatlakozas(tema) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chatFelület').style.display = 'block';
            document.getElementById('temaCim').innerText = "Téma: #" + tema;
            
            socket.emit('join_topic', tema);
        }

        function kuldes() {
            const inp = document.getElementById('uzenetInp');
            if(inp.value.trim() !== "") {
                socket.emit('send_message', inp.value);
                renderelemUzenet("Én: " + inp.value);
                inp.value = "";
            }
        }

        function renderelemUzenet(szoveg) {
            const p = document.createElement('p');
            p.innerText = szoveg;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        socket.on('waiting', (msg) => renderelemUzenet(msg));
        socket.on('chat_ready', (msg) => renderelemUzenet("Rendszer: " + msg));
        socket.on('receive_message', (msg) => renderelemUzenet("Partner: " + msg));
        socket.on('partner_left', (msg) => renderelemUzenet("Rendszer: " + msg));
    </script>
</body>
</html>
